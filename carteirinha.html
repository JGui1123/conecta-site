<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha Virtual — coNecta</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cn-ink: #0A1628; --cn-primary: #1E5CFF; --cn-primary-d: #1748CC; --cn-primary-l: #EAF1FF; --cn-accent: #FF7A45; --cn-bone: #F7F5F0; --cn-paper: #FFFFFF; --cn-line: #E6E2D9; --cn-mute: #6B7280; --cn-success: #10B981; --cn-font-display: 'Sora', sans-serif; --cn-font-body: 'Inter', sans-serif; --cn-radius: 12px; --cn-shadow: 0 4px 16px rgba(10,22,40,.06); }
        body { font-family: var(--cn-font-body); background: var(--cn-bone); color: var(--cn-ink); margin: 0; }
        nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; height: 64px; background: rgba(247,245,240,.96); border-bottom: 1px solid var(--cn-line); }
        .logo-link { display: flex; align-items: center; gap: .5rem; text-decoration: none; } .logo-link svg { width: 34px; height: 34px; } .logo-txt { font-family: var(--cn-font-display); font-size: 1.2rem; font-weight: 700; color: var(--cn-ink); } .logo-txt span { color: var(--cn-primary); }
        .nav-links { display: flex; gap: 1.75rem; list-style: none; } .nav-links a { font-size: .875rem; color: var(--cn-mute); text-decoration: none; } .nav-links a:hover, .nav-links a.active { color: var(--cn-ink); font-weight: 600; }
        .btn-nav { background: var(--cn-primary); color: #fff; font-size: .85rem; font-weight: 600; padding: .55rem 1.25rem; border-radius: 8px; text-decoration: none; }
        .page-wrap { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem; }
        .page-header { text-align: center; margin-bottom: 2.5rem; } .ph-tag { font-size: .72rem; font-weight: 700; text-transform: uppercase; color: var(--cn-primary); margin-bottom: .6rem; } .ph-title { font-family: var(--cn-font-display); font-size: 2rem; font-weight: 600; margin-bottom: .6rem; } .ph-sub { font-size: .92rem; color: var(--cn-mute); }
        .vouchers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .voucher { background: var(--cn-paper); border: 1.5px solid var(--cn-line); border-radius: var(--cn-radius); padding: 1.25rem; transition: all .2s; } .voucher:hover { box-shadow: var(--cn-shadow); transform: translateY(-2px); }
        .voucher-desconto { font-family: var(--cn-font-display); font-size: 1.8rem; font-weight: 700; color: var(--cn-primary); } .voucher-tipo { font-size: .65rem; font-weight: 700; background: var(--cn-primary-l); color: var(--cn-primary); padding: 3px 9px; border-radius: 20px; } .voucher-parceiro { font-size: .9rem; font-weight: 600; margin: .5rem 0; } .voucher-codigo { background: var(--cn-bone); border: 1px dashed var(--cn-line); border-radius: 6px; padding: .5rem; font-family: monospace; text-align: center; margin: .75rem 0; } .voucher-validade { font-size: .7rem; color: var(--cn-mute); text-align: center; }
        @media (max-width: 900px) { .nav-links { display: none; } }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="logo-link"><svg width="34" height="34" viewBox="0 0 110 110" fill="none"><path d="M22 92V28L88 84V28" stroke="#0A1628" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><circle cx="88" cy="28" r="9" fill="#FF7A45"/><circle cx="22" cy="92" r="9" fill="#1E5CFF"/></svg><span class="logo-txt">co<span>N</span>ecta</span></a>
    <ul class="nav-links"><li><a href="marketplace.html">Marketplace</a></li><li><a href="vagas.html">Vagas</a></li><li><a href="capacitacao.html">Capacitação</a></li><li><a href="carteirinha.html" class="active">Carteirinha</a></li></ul>
    <a href="login.html" class="btn-nav">Entrar ↗</a>
</nav>
<div class="page-wrap">
    <div class="page-header"><div class="ph-tag">Carteirinha Virtual</div><h1 class="ph-title">Seus benefícios</h1><p class="ph-sub">Vouchers exclusivos para estabelecimentos parceiros.</p></div>
    <div class="vouchers-grid" id="vouchersGrid"></div>
</div>

<script>
    const SUPABASE_URL = 'https://pzcycbmnnphywdzvymyr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6Y3ljYm1ubnBoeXdkenZ5bXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjczOTksImV4cCI6MjA5Mzk0MzM5OX0.f4jtslTFMnn0OhwiEhU7A_O6spowX6h4GEbHQ22hIEM';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function carregar() {
        const { data } = await db.from('vouchers').select('*').eq('ativo', true).order('criado_em', { ascending: false });
        const grid = document.getElementById('vouchersGrid');
        if (!data || !data.length) {
            grid.innerHTML = '<p style="text-align:center;padding:3rem;color:var(--cn-mute)">Nenhum voucher disponível.</p>';
            return;
        }
        grid.innerHTML = data.map(v => `
            <div class="voucher">
                <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div class="voucher-desconto">${v.desconto}</div>
                    <div class="voucher-tipo">${v.tipo}</div>
                </div>
                <div class="voucher-parceiro">${v.parceiro_nome}</div>
                ${v.categoria ? `<div style="font-size:.75rem;color:var(--cn-mute);margin-bottom:.5rem">📂 ${v.categoria}</div>` : ''}
                <div class="voucher-codigo">${v.codigo}</div>
                ${v.validade ? `<div class="voucher-validade">Válido até ${new Date(v.validade).toLocaleDateString('pt-BR')}</div>` : ''}
            </div>
        `).join('');
    }
    carregar();
</script>
</body>
</html>
