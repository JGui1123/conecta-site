<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso — coNecta</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --cn-ink: #0A1628; --cn-primary: #1E5CFF; --cn-primary-d: #1748CC;
            --cn-primary-l: #EAF1FF; --cn-accent: #FF7A45; --cn-bone: #F7F5F0;
            --cn-paper: #FFFFFF; --cn-line: #E6E2D9; --cn-mute: #6B7280;
            --cn-font-display: 'Sora', system-ui, sans-serif; --cn-font-body: 'Inter', system-ui, sans-serif;
            --cn-radius: 14px;
        }
        body {
            font-family: var(--cn-font-body);
            background: var(--cn-bone);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 460px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--cn-mute);
            text-decoration: none;
            font-size: 0.83rem;
            margin-bottom: 1.5rem;
            transition: 0.2s;
            font-weight: 500;
        }
        .back-link:hover { color: var(--cn-ink); }
        .card {
            background: var(--cn-paper);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            border: 1px solid var(--cn-line);
            box-shadow: 0 10px 30px rgba(10,22,40,.04);
        }
        .logo-svg { text-align: center; margin-bottom: 1.5rem; }
        .logo-svg svg { width: 44px; height: 44px; }
        .tabs {
            display: flex;
            gap: .5rem;
            background: #f1f5f9;
            border-radius: 12px;
            padding: .4rem;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            padding: .7rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: var(--cn-mute);
            transition: .3s;
            background: transparent;
            font-size: .88rem;
            font-family: var(--cn-font-body);
        }
        .tab.active {
            background: var(--cn-paper);
            color: var(--cn-primary);
            box-shadow: 0 4px 12px rgba(10,22,40,.05);
        }
        .perfil-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: .7rem;
            margin-bottom: 2rem;
        }
        .perfil-opt {
            border: 1.5px solid var(--cn-line);
            border-radius: 12px;
            padding: 1rem .5rem;
            cursor: pointer;
            text-align: center;
            transition: .2s;
            background: var(--cn-paper);
        }
        .perfil-opt.active {
            border-color: var(--cn-primary);
            background: var(--cn-primary-l);
        }
        .perfil-opt span {
            font-weight: 700;
            font-size: .73rem;
            display: block;
            color: var(--cn-ink);
        }
        .form-group {
            margin-bottom: 1.15rem;
        }
        label {
            display: block;
            font-size: .78rem;
            font-weight: 600;
            margin-bottom: .4rem;
            color: var(--cn-ink);
        }
        input, select {
            width: 100%;
            padding: .75rem;
            border: 1.5px solid var(--cn-line);
            border-radius: 12px;
            outline: none;
            font-family: inherit;
            background: var(--cn-paper);
            font-size: .88rem;
            transition: .2s;
        }
        input:focus, select:focus {
            border-color: var(--cn-primary);
            box-shadow: 0 0 0 4px var(--cn-primary-l);
        }
        .hidden { display: none; }
        .btn-main {
            width: 100%;
            padding: .95rem;
            background: var(--cn-primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            margin-top: 1rem;
            font-family: var(--cn-font-display);
            font-size: .92rem;
        }
        .btn-main:hover {
            background: var(--cn-primary-d);
            transform: translateY(-1px);
        }
        .btn-google {
            width: 100%;
            padding: .75rem;
            background: var(--cn-paper);
            border: 1.5px solid var(--cn-line);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            transition: .2s;
            font-size: .88rem;
            color: var(--cn-ink);
            font-family: var(--cn-font-body);
        }
        .btn-google:hover { background: #f9fafb; }
        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Voltar ao início</a>
    <div class="card">
        <div class="logo-svg">
            <svg width="44" height="44" viewBox="0 0 110 110" fill="none"><path d="M22 92V28L88 84V28" stroke="#0A1628" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><circle cx="88" cy="28" r="9" fill="#FF7A45"/><circle cx="22" cy="92" r="9" fill="#1E5CFF"/></svg>
        </div>
        <div class="tabs">
            <button class="tab active" id="btn-login" onclick="switchTab('login')">Entrar</button>
            <button class="tab" id="btn-cadastro" onclick="switchTab('cadastro')">Criar Conta</button>
        </div>
        <div id="erroMsg" style="background:#FEE2E2; color:#991B1B; padding:.7rem; border-radius:8px; font-size:.8rem; margin-bottom:1rem; display:none;"></div>

        <!-- LOGIN -->
        <div id="section-login">
            <button class="btn-google" onclick="alert('Em breve')">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" alt="Google">
                Entrar com Google
            </button>
            <form onsubmit="handleLogin(event)" style="display:flex;flex-direction:column;gap:.8rem">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="lemail" placeholder="exemplo@email.com" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="lsenha" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="btn-main">Acessar Conta →</button>
            </form>
        </div>

        <!-- CADASTRO -->
        <div id="section-cadastro" class="hidden">
            <div class="perfil-grid">
                <div class="perfil-opt active" onclick="setPerfil('consumidor', this)">
                    <span>🛒 Consumidor</span>
                </div>
                <div class="perfil-opt" onclick="setPerfil('autonomo', this)">
                    <span>🔧 Autônomo</span>
                </div>
                <div class="perfil-opt" onclick="setPerfil('candidato', this)">
                    <span>📄 Candidato</span>
                </div>
                <div class="perfil-opt" onclick="setPerfil('empresa', this)">
                    <span>🏢 Empresa</span>
                </div>
            </div>
            <form onsubmit="handleCadastro(event)" style="display:flex;flex-direction:column;gap:.8rem">
                <div class="form-group">
                    <label id="labelNome">Nome Completo</label>
                    <input type="text" id="cnome" placeholder="Seu nome" required>
                </div>
                <div class="form-group hidden" id="cnpjWrapper">
                    <label>CNPJ *</label>
                    <input type="text" id="ccnpj" placeholder="00.000.000/0000-00" oninput="maskCNPJ(this)">
                </div>
                <div class="form-group hidden" id="areaWrapper">
                    <label>Área de Atuação</label>
                    <select id="carea">
                        <option value="">Selecione</option>
                        <option>Administrativo</option>
                        <option>Vendas</option>
                        <option>Logística</option>
                        <option>Construção</option>
                        <option>Beleza</option>
                        <option>Gastronomia</option>
                        <option>Saúde</option>
                        <option>Educação</option>
                        <option>Tecnologia</option>
                        <option>Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="tel" id="cwhatsapp" placeholder="(99) 99999-9999" oninput="maskPhone(this)" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="cemail" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Cidade</label>
                    <select id="ccidade">
                        <option>Pinheiro</option>
                        <option>Santa Inês</option>
                        <option>Viana</option>
                        <option>São Bento</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Criar Senha (mín. 6 caracteres)</label>
                    <input type="password" id="csenha" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn-main" id="btnCadastrar">Acessar Marketplace →</button>
            </form>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pzcycbmnnphywdzvymyr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6Y3ljYm1ubnBoeXdkenZ5bXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjczOTksImV4cCI6MjA5Mzk0MzM5OX0.f4jtslTFMnn0OhwiEhU7A_O6spowX6h4GEbHQ22hIEM';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let perfil = 'consumidor';

    function switchTab(m) {
        document.getElementById('section-login').classList.toggle('hidden', m !== 'login');
        document.getElementById('section-cadastro').classList.toggle('hidden', m !== 'cadastro');
        document.getElementById('btn-login').classList.toggle('active', m === 'login');
        document.getElementById('btn-cadastro').classList.toggle('active', m === 'cadastro');
    }

    function setPerfil(t, el) {
        perfil = t;
        document.querySelectorAll('.perfil-opt').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('cnpjWrapper').classList.toggle('hidden', t !== 'empresa');
        document.getElementById('areaWrapper').classList.toggle('hidden', !(t === 'autonomo' || t === 'candidato'));
        document.getElementById('labelNome').textContent = t === 'empresa' ? 'Nome da Empresa' : 'Nome Completo';
        const labels = {
            consumidor: 'Acessar Marketplace →',
            autonomo: 'Criar Perfil Profissional →',
            candidato: 'Cadastrar para Vagas →',
            empresa: 'Abrir Conta Business →'
        };
        document.getElementById('btnCadastrar').textContent = labels[t];
    }

    function maskPhone(i) {
        let v = i.value.replace(/\D/g,'');
        v = v.substring(0, 11);
        if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
        else if (v.length > 5) v = v.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
        i.value = v;
    }

    function maskCNPJ(i) {
        let v = i.value.replace(/\D/g,'');
        v = v.substring(0,14);
        if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4})/, "$1.$2.$3/$4");
        i.value = v;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('lemail').value;
        const password = document.getElementById('lsenha').value;
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) {
            mostrarErro(error.message);
            return;
        }
        window.location.href = 'painel.html';
    }

    async function handleCadastro(e) {
        e.preventDefault();
        if (perfil === 'empresa' && !document.getElementById('ccnpj').value) {
            mostrarErro('CNPJ obrigatório para empresas.');
            return;
        }
        const nome = document.getElementById('cnome').value;
        const email = document.getElementById('cemail').value;
        const senha = document.getElementById('csenha').value;
        const whatsapp = document.getElementById('cwhatsapp').value;
        const cidade = document.getElementById('ccidade').value;
        const { data, error } = await db.auth.signUp({
            email,
            password: senha,
            options: { data: { nome, whatsapp, cidade, tipo_perfil: perfil } }
        });
        if (error) {
            mostrarErro(error.message);
            return;
        }
        await db.from('perfis').insert([{
            id: data.user.id,
            nome,
            email,
            whatsapp,
            cidade,
            tipo_perfil: perfil,
            cnpj: perfil === 'empresa' ? document.getElementById('ccnpj').value : null,
            area: document.getElementById('carea')?.value || null
        }]);
        window.location.href = 'painel.html';
    }

    function mostrarErro(msg) {
        const el = document.getElementById('erroMsg');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
</script>
</body>
</html>
