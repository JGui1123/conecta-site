<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitação — coNecta</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cn-ink: #0A1628; --cn-primary: #1E5CFF; --cn-primary-d: #1748CC; --cn-primary-l: #EAF1FF; --cn-accent: #FF7A45; --cn-bone: #F7F5F0; --cn-paper: #FFFFFF; --cn-line: #E6E2D9; --cn-mute: #6B7280; --cn-success: #10B981; --cn-font-display: 'Sora', sans-serif; --cn-font-body: 'Inter', sans-serif; --cn-radius: 12px; --cn-shadow: 0 4px 16px rgba(10,22,40,.06); }
        body { font-family: var(--cn-font-body); background: var(--cn-bone); color: var(--cn-ink); margin: 0; }
        nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; height: 64px; background: rgba(247,245,240,.96); border-bottom: 1px solid var(--cn-line); }
        .logo-link { display: flex; align-items: center; gap: .5rem; text-decoration: none; } .logo-link svg { width: 34px; height: 34px; } .logo-txt { font-family: var(--cn-font-display); font-size: 1.2rem; font-weight: 700; color: var(--cn-ink); } .logo-txt span { color: var(--cn-primary); }
        .nav-links { display: flex; gap: 1.75rem; list-style: none; } .nav-links a { font-size: .875rem; color: var(--cn-mute); text-decoration: none; } .nav-links a:hover, .nav-links a.active { color: var(--cn-ink); font-weight: 600; }
        .btn-nav { background: var(--cn-primary); color: #fff; font-size: .85rem; font-weight: 600; padding: .55rem 1.25rem; border-radius: 8px; text-decoration: none; }
        .hero { background: var(--cn-ink); padding: 3rem 2rem; text-align: center; color: #fff; } .hero h1 { font-family: var(--cn-font-display); font-size: 2rem; font-weight: 600; margin-bottom: .5rem; } .hero p { color: rgba(255,255,255,.6); }
        .page-wrap { max-width: 1160px; margin: 0 auto; padding: 2rem; }
        .cursos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .curso-card { background: var(--cn-paper); border: 1.5px solid var(--cn-line); border-radius: var(--cn-radius); overflow: hidden; transition: all .22s; }
        .curso-card:hover { box-shadow: var(--cn-shadow); transform: translateY(-3px); }
        .curso-thumb { height: 180px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; background-color: var(--cn-primary-l); }
        .curso-badge { position: absolute; top: .75rem; left: .75rem; font-size: .68rem; font-weight: 700; padding: 4px 11px; border-radius: 20px; } .cb-gratis { background: #D1FAE5; color: #065F46; } .cb-pago { background: #FEF3C7; color: #92400E; }
        .curso-body { padding: 1.5rem; } .curso-cat { font-size: .72rem; font-weight: 600; color: var(--cn-primary); text-transform: uppercase; margin-bottom: .4rem; } .curso-nome { font-family: var(--cn-font-display); font-size: 1.05rem; font-weight: 700; margin-bottom: .5rem; } .curso-desc { font-size: .84rem; color: var(--cn-mute); margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .curso-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--cn-line); padding-top: 1rem; } .curso-preco { font-family: var(--cn-font-display); font-size: 1.1rem; font-weight: 700; }
        .btn-matricula { background: var(--cn-primary); color: #fff; border: none; border-radius: 8px; padding: .5rem 1.1rem; font-size: .82rem; font-weight: 600; cursor: pointer; font-family: var(--cn-font-body); transition: all .2s; }
        .btn-matricula:hover { background: var(--cn-primary-d); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,.65); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1.5rem; backdrop-filter: blur(4px); }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--cn-paper); border-radius: 16px; max-width: 500px; width: 100%; padding: 2rem; box-shadow: 0 20px 60px rgba(10,22,40,.3); text-align: center; }
        .modal-box h3 { font-family: var(--cn-font-display); margin-bottom: 1rem; }
        .pix-chave { background: #f1f5f9; padding: .6rem; border-radius: 8px; font-weight: 600; user-select: all; }
        @media (max-width: 900px) { .nav-links { display: none; } }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="logo-link"><svg width="34" height="34" viewBox="0 0 110 110" fill="none"><path d="M22 92V28L88 84V28" stroke="#0A1628" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><circle cx="88" cy="28" r="9" fill="#FF7A45"/><circle cx="22" cy="92" r="9" fill="#1E5CFF"/></svg><span class="logo-txt">co<span>N</span>ecta</span></a>
    <ul class="nav-links"><li><a href="marketplace.html">Marketplace</a></li><li><a href="vagas.html">Vagas</a></li><li><a href="capacitacao.html" class="active">Capacitação</a></li><li><a href="carteirinha.html">Carteirinha</a></li></ul>
    <a href="login.html" class="btn-nav">Entrar ↗</a>
</nav>
<div class="hero"><h1>Capacitação Profissional</h1><p>Cursos para você se destacar no mercado</p></div>
<div class="page-wrap"><div class="cursos-grid" id="cursosGrid"></div></div>

<!-- Modal PIX -->
<div class="modal-overlay" id="modalPix" onclick="fecharModalPix(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 id="modalTitulo">Pagamento via PIX</h3>
        <p>Valor: <strong id="pixValor"></strong></p>
        <div class="pix-chave">guilermo_monteiro@gmail.com</div>
        <p style="font-size:.8rem; color:var(--cn-mute); margin-top:1rem;">Após o pagamento, clique em "Já paguei" para notificar o administrador.</p>
        <div style="display:flex; gap:.5rem; margin-top:1.5rem; justify-content:center;">
            <button class="btn-matricula" id="btnNotificar">Já paguei – Notificar via WhatsApp</button>
            <button class="btn-matricula" style="background: var(--cn-mute);" onclick="fecharModalPix()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pzcycbmnnphywdzvymyr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6Y3ljYm1ubnBoeXdkenZ5bXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjczOTksImV4cCI6MjA5Mzk0MzM5OX0.f4jtslTFMnn0OhwiEhU7A_O6spowX6h4GEbHQ22hIEM';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let cursosData = [];

    async function carregar() {
        const { data } = await db.from('cursos').select('*').eq('ativo', true).order('criado_em', { ascending: false });
        cursosData = data || [];
        renderizar();
    }
    carregar();

    function renderizar() {
        const grid = document.getElementById('cursosGrid');
        if (!cursosData.length) {
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:3rem;">Nenhum curso disponível no momento.</p>';
            return;
        }
        grid.innerHTML = cursosData.map(c => {
            const thumbUrl = (c.imagens && c.imagens.length > 0) ? c.imagens[0] : '';
            return `<div class="curso-card">
                <div class="curso-thumb" style="background-image:url('${thumbUrl}')">${!thumbUrl ? '🎓' : ''}<span class="curso-badge ${c.gratis ? 'cb-gratis' : 'cb-pago'}">${c.gratis ? 'Grátis' : 'Pago'}</span></div>
                <div class="curso-body">
                    <div class="curso-cat">${c.categoria}</div>
                    <div class="curso-nome">${c.nome}</div>
                    <div class="curso-footer">
                        <div class="curso-preco">${c.gratis ? 'Grátis' : 'R$ ' + (c.preco || 0).toFixed(2)}</div>
                        <button class="btn-matricula" onclick="matricular(${c.id})">${c.gratis ? 'Acessar agora' : 'Matricular-se'}</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function matricular(cursoId) {
        const { data: { session } } = await db.auth.getSession();
        if (!session) {
            alert('Faça login para se inscrever.');
            window.location.href = 'login.html';
            return;
        }
        const curso = cursosData.find(c => c.id === cursoId);
        if (!curso) return;

        if (curso.gratis) {
            await db.from('matriculas').insert({ user_id: session.user.id, curso_id: cursoId, status: 'ativo' });
            window.location.href = `curso-aula.html?id=${cursoId}`;
        } else {
            document.getElementById('pixValor').textContent = `R$ ${curso.preco.toFixed(2)}`;
            document.getElementById('modalTitulo').textContent = `Curso: ${curso.nome}`;
            document.getElementById('btnNotificar').onclick = async () => {
                const { data: perfil } = await db.from('perfis').select('nome').eq('id', session.user.id).single();
                const nomeComprador = perfil?.nome || 'Usuário';
                const mensagem = `Curso: ${curso.nome} (ID: ${curso.id}) - R$ ${curso.preco.toFixed(2)}\nComprador: ${nomeComprador} (ID: ${session.user.id})`;
                window.open(`https://wa.me/351962890061?text=${encodeURIComponent(mensagem)}`, '_blank');
                await db.from('matriculas').insert({ user_id: session.user.id, curso_id: cursoId, status: 'ativo' });
                fecharModalPix();
                window.location.href = `curso-aula.html?id=${cursoId}`;
            };
            document.getElementById('modalPix').classList.add('show');
        }
    }

    function fecharModalPix(e) {
        if (e && e.target !== document.getElementById('modalPix')) return;
        document.getElementById('modalPix').classList.remove('show');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModalPix(); });
</script>
</body>
</html>
